<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nbaron | home</title>

  <style>
    :root {
      --text: #f5fbff;
      --muted: #b5c5d6;
      --accent: #79f0ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Courier New", monospace;
      color: var(--text);
      background: black;
      overflow: hidden;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .logo {
      color: var(--text);
      text-decoration: none;
      font-size: 1.2rem;
      letter-spacing: 0.15em;
      text-transform: lowercase;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.95rem;
      text-transform: lowercase;
    }

    nav a:hover,
    nav a.active {
      color: var(--accent);
    }

    .sound-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--muted);
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      text-transform: lowercase;
    }

    .sound-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 1rem;
    }

    .hero-content {
      max-width: 800px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      margin-bottom: 1rem;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .eyebrow.show {
      opacity: 1;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: 0.9;
      margin-bottom: 0.8rem;
      text-transform: lowercase;
      min-height: 1.1em;
    }

    h2 {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: normal;
      color: var(--text);
      margin-bottom: 1.8rem;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      min-height: 1.4em;
    }

    .typing::after {
      content: "|";
      color: var(--text);
      margin-left: 0.08em;
      animation: blink 0.9s steps(1) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .button-row {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }

    .button-row.show {
      opacity: 1;
      transform: translateY(0);
    }

    .btn {
      display: inline-block;
      padding: 0.8rem 1.4rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      text-decoration: none;
      color: var(--text);
      margin: 0 0.4rem;
      background: transparent;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      text-transform: lowercase;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    @media (max-width: 768px) {
      header {
        padding: 1rem;
        flex-direction: column;
        gap: 1rem;
      }

      nav {
        flex-direction: column;
        gap: 0.8rem;
      }

      nav ul {
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <div id="header-container"></div>

  <section class="hero">
    <div class="hero-content">
      <p class="eyebrow" id="eyebrow">life × technology</p>
      <h1 id="line1"></h1>
      <h2 id="line2"></h2>

      <div class="button-row" id="button-row">
        <a class="btn" href="about.html">who am i</a>
        <a class="btn" href="resume.html">what do i do</a>
      </div>
    </div>
  </section>

  <script>
  const line1 = document.getElementById("line1");
  const line2 = document.getElementById("line2");
  const eyebrow = document.getElementById("eyebrow");
  const buttonRow = document.getElementById("button-row");

  function setupSharedHeader() {
    fetch("header.html")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Failed to load header.html");
        }
        return response.text();
      })
      .then((html) => {
        const container = document.getElementById("header-container");
        container.innerHTML = html;

        const audio = document.getElementById("bg-music");
        const soundToggle = document.getElementById("sound-toggle");

        if (!audio || !soundToggle) return;

        audio.volume = 0.025;

        function updateSoundButton() {
          const isOn = !audio.paused;
          soundToggle.textContent = isOn ? "sound: on" : "sound: off";
          sessionStorage.setItem("musicEnabled", isOn ? "true" : "false");
        }

        function playAudio() {
          if (!audio.paused) {
            updateSoundButton();
            return;
          }

          audio.play()
            .then(() => {
              updateSoundButton();
            })
            .catch(() => {
              updateSoundButton();
            });
        }

        function pauseAudio() {
          audio.pause();
          updateSoundButton();
        }

        soundToggle.addEventListener("click", (event) => {
          event.stopPropagation();

          if (audio.paused) {
            playAudio();
          } else {
            pauseAudio();
          }
        });

        document.addEventListener("click", playAudio, { once: true });
        document.addEventListener("keydown", playAudio, { once: true });
        document.addEventListener("touchstart", playAudio, { once: true });

        updateSoundButton();
      })
      .catch((error) => {
        console.error("Shared header failed to load:", error);
      });
  }

  function typeText(element, text, speed = 90) {
    return new Promise((resolve) => {
      let index = 0;
      element.textContent = "";
      element.classList.add("typing");

      function typeNext() {
        if (index < text.length) {
          element.textContent += text.charAt(index);
          index++;
          setTimeout(typeNext, speed);
        } else {
          element.classList.remove("typing");
          resolve();
        }
      }

      typeNext();
    });
  }

  async function runIntro() {
    await typeText(line1, "i'm nick", 110);
    await new Promise((resolve) => setTimeout(resolve, 250));

    await typeText(line2, "welcome to my website", 70);
    await new Promise((resolve) => setTimeout(resolve, 250));

    eyebrow.classList.add("show");
    await new Promise((resolve) => setTimeout(resolve, 900));

    buttonRow.classList.add("show");
  }

  window.addEventListener("load", () => {
    setupSharedHeader();
    runIntro();
  });
</script>

</body>
</html>
